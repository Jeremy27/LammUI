name: Publish to GitHub Packages

on:
  push:
    tags:
      - 'v*'

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 25
        uses: actions/setup-java@v4
        with:
          java-version: '25'
          distribution: 'temurin'
          server-id: github
          settings-path: ${{ github.workspace }}

      - name: Verify pom version matches tag
        run: |
          POM_VERSION=$(mvn -q help:evaluate -Dexpression=project.version -DforceStdout)
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          if [ "$POM_VERSION" != "$TAG_VERSION" ]; then
            echo "::error::Version pom ($POM_VERSION) != tag ($TAG_VERSION)"
            exit 1
          fi

      - name: Publish to GitHub Packages
        run: mvn --batch-mode -s $GITHUB_WORKSPACE/settings.xml deploy
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
